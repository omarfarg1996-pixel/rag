version: '3.8'

services:
  # Redis - Working Memory + Semantic Cache + Intuitive Memory
  redis:
    image: redis/redis-stack-server:7.2.0-v6
    container_name: super_rag_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      --maxmemory 1gb
      --maxmemory-policy allkeys-lru
      --activedefrag yes
      --hash-max-ziplist-entries 512
      --hash-max-ziplist-value 64
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # Milvus - Semantic Memory with RaBitQ optimization
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.11
    container_name: super_rag_milvus_etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - milvus_etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  milvus-minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    container_name: super_rag_milvus_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - milvus_minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M

  milvus-standalone:
    image: milvusdb/milvus:v2.6.0
    container_name: super_rag_milvus
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MILVUS_MEM_LIMIT: 2GB
    volumes:
      - milvus_data:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - milvus-etcd
      - milvus-minio
    command: ["milvus", "run", "standalone"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 2G

  # PostgreSQL - Episodic Memory with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: super_rag_postgres
    environment:
      POSTGRES_USER: super_rag
      POSTGRES_PASSWORD: super_rag_password
      POSTGRES_DB: episodic_memory
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgresql.conf:/etc/postgresql/postgresql.conf
    ports:
      - "5432:5432"
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U super_rag"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # Neo4j - Knowledge Graph
  neo4j:
    image: neo4j:5.15-community
    container_name: super_rag_neo4j
    environment:
      NEO4J_AUTH: neo4j/super_rag_password
      NEO4J_dbms_memory_heap_initial__size: 256m
      NEO4J_dbms_memory_heap_max__size: 512m
      NEO4J_dbms_memory_pagecache_size: 256m
      NEO4J_dbms_memory_transaction_total_max: 100
    volumes:
      - neo4j_data:/data
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "neo4j-admin", "status"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 1G

  # Super RAG Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: super_rag_backend
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - MILVUS_HOST=milvus-standalone
      - MILVUS_PORT=19530
      - POSTGRES_URI=postgresql://super_rag:super_rag_password@postgres:5432/episodic_memory
      - NEO4J_URI=neo4j://neo4j:super_rag_password@neo4j:7687
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
    volumes:
      - ./backend:/app
      - ./config:/config
    depends_on:
      redis:
        condition: service_healthy
      milvus-standalone:
        condition: service_healthy
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: super_rag_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis_data:
  milvus_etcd:
  milvus_minio:
  milvus_data:
  postgres_data:
  neo4j_data:

networks:
  default:
    name: super_rag_network
