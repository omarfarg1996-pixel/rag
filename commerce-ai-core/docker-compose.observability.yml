version: '3.8'

# Commerce AI Core - Observability Stack
# Includes Prometheus, Grafana, Loki, and OpenTelemetry Collector

services:
  # ============================================
  # OpenTelemetry Collector
  # ============================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: commerce-ai-core-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./infra/observability/otel/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
      - "8888:8888"   # Prometheus metrics
    depends_on:
      - prometheus
      - loki
      - tempo
    networks:
      - commerce-network

  # ============================================
  # Prometheus - Metrics Collection
  # ============================================
  prometheus:
    image: prom/prometheus:v2.50.1
    container_name: commerce-ai-core-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./infra/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - commerce-network

  # ============================================
  # Grafana - Dashboards & Visualization
  # ============================================
  grafana:
    image: grafana/grafana:10.3.4
    container_name: commerce-ai-core-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: false
      GF_SERVER_ROOT_URL: http://localhost:3100
      GF_AUTH_ANONYMOUS_ENABLED: false
    ports:
      - "3100:3100"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infra/observability/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml
      - ./infra/observability/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml
      - ./infra/observability/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - commerce-network

  # ============================================
  # Loki - Log Aggregation
  # ============================================
  loki:
    image: grafana/loki:2.9.4
    container_name: commerce-ai-core-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yaml
    ports:
      - "3101:3100"
    volumes:
      - ./infra/observability/loki/loki-config.yml:/etc/loki/local-config.yaml
      - loki_data:/loki
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - commerce-network

  # ============================================
  # Tempo - Distributed Tracing
  # ============================================
  tempo:
    image: grafana/tempo:2.4.0
    container_name: commerce-ai-core-tempo
    restart: unless-stopped
    command: ["-config.file=/etc/tempo-config.yml"]
    ports:
      - "3200:3200"     # Tempo API
      - "4319:4317"     # OTLP gRPC (alternative port)
    volumes:
      - ./infra/observability/tempo/tempo-config.yml:/etc/tempo-config.yml
      - tempo_data:/tmp/tempo
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3200/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - commerce-network

  # ============================================
  # Promtail - Log Shipper
  # ============================================
  promtail:
    image: grafana/promtail:2.9.4
    container_name: commerce-ai-core-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./infra/observability/promtail/config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
      - ./logs:/app/logs
    depends_on:
      - loki
    networks:
      - commerce-network

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local
  tempo_data:
    driver: local

networks:
  commerce-network:
    external: true
